# Alembic configuration for APFA — database migrations
#
# The sqlalchemy.url is left blank here and is populated at runtime by
# alembic/env.py which reads settings.database_url from app/config.py.
# This keeps the connection string out of the repo (env vars only).

[alembic]
# %(here)s resolves to the directory containing this ini file, so the path
# works regardless of where alembic is invoked from (docker, local, CI).
script_location = %(here)s/alembic
# APFA-013.5: %(here)s is app/, %(here)s/.. is the repo root. Prepending
# the repo root makes `from app.X import Y` work in alembic/env.py without
# the old sys.path.insert hack.
prepend_sys_path = %(here)s/..
version_path_separator = os

# sqlalchemy.url is set dynamically in env.py from settings.database_url
sqlalchemy.url =

[post_write_hooks]
# Formatting hooks (disabled — keep migrations readable as-is)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
