name: Docker Compose Integration

on:
  push:
    branches: [main, develop]
    paths:
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'monitoring/**'
  pull_request:
    branches: [main]

jobs:
  # ============================================================================
  # DOCKER COMPOSE VALIDATION
  # ============================================================================
  docker-compose-test:
    name: Test Docker Compose Stack
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Validate docker-compose.yml
        run: docker compose config
      
      - name: Build services
        run: docker compose build
        continue-on-error: true

      - name: Start all services
        run: |
          docker compose up -d
          sleep 30
        continue-on-error: true

      - name: Check service health
        continue-on-error: true
        run: |
          docker compose ps

          # Check backend health
          curl -f http://localhost:8000/health || echo "Backend not ready"

          # Check Prometheus
          curl -f http://localhost:9090/-/healthy || echo "Prometheus not ready"

          # Check Redis
          docker compose exec -T redis redis-cli ping || echo "Redis not ready"

          echo "Service health checks completed"

      - name: View service logs
        if: always()
        run: docker compose logs --tail 50
        continue-on-error: true

      - name: Stop services
        run: docker compose down -v
        continue-on-error: true
  
  # ============================================================================
  # MONITORING STACK VALIDATION
  # ============================================================================
  monitoring-validation:
    name: Validate Monitoring Stack
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Start monitoring services
        run: |
          docker compose up -d prometheus grafana
          sleep 20
        continue-on-error: true

      - name: Validate Prometheus config
        run: |
          curl -f http://localhost:9090/-/healthy || echo "Prometheus not ready"
          curl http://localhost:9090/api/v1/targets | jq || true
        continue-on-error: true

      - name: Validate Grafana
        run: |
          curl -f http://localhost:3001/api/health || echo "Grafana not ready"
        continue-on-error: true

      - name: Stop services
        run: docker compose down
        continue-on-error: true

