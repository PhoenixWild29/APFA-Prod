name: Auto Deploy APFA-Prod to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check deploy secrets
        id: check
        env:
          HAS_IP: ${{ secrets.DROPLET_IP != '' }}
          HAS_KEY: ${{ secrets.DROPLET_SSH_KEY != '' }}
        run: |
          if [ "$HAS_IP" = "true" ] && [ "$HAS_KEY" = "true" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "Deploy secrets configured — proceeding with deploy."
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "Deploy secrets not configured yet — skipping deploy. Set DROPLET_IP and DROPLET_SSH_KEY to enable."
          fi

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed file types
        id: diff
        run: |
          # Robust changed-file detection for both normal commits and merge commits.
          # `git diff HEAD^..HEAD` reliably captures PR changes merged into main.
          # fetch-depth: 0 ensures all parents are available in shallow CI clone.
          git diff --name-only HEAD^..HEAD > /tmp/changed.txt 2>/dev/null || \
            git diff --name-only HEAD~1 HEAD > /tmp/changed.txt 2>/dev/null || \
            git show --name-only --format="" HEAD > /tmp/changed.txt
          echo "Changed files:"
          cat /tmp/changed.txt

          FE_PATTERN='^(src|public)/|package(-lock)?\.json$|^Dockerfile\.frontend$|^vite\.config\.ts$|^tailwind\.config\.js$|^\.prettierrc\.cjs$|^\.eslintrc\.cjs$|^postcss\.config\.js$|^index\.html$|^tsconfig(\..*)?\.json$|^\.env\.production$'
          BE_PATTERN='^app/|^requirements\.txt$|^Dockerfile$|^docker-compose\.yml$|^nginx\.conf$|^entrypoint\.sh$|^migrations/'
          IGNORE_PATTERN='^README|^docs/|^\.github/|^LICENSE$|\.md$|^CHANGELOG|^monitoring/|^tests/'

          FRONTEND_DETECTED=false
          if grep -qE "$FE_PATTERN" /tmp/changed.txt; then
            FRONTEND_DETECTED=true
          fi

          BACKEND_DETECTED=false
          if grep -qE "$BE_PATTERN" /tmp/changed.txt; then
            BACKEND_DETECTED=true
          fi

          MIGRATION=$(grep -E '^migrations/' /tmp/changed.txt | head -1 || true)
          echo "migration_file=$MIGRATION" >> $GITHUB_OUTPUT

          if [ "$FRONTEND_DETECTED" = "false" ] && [ "$BACKEND_DETECTED" = "false" ]; then
            UNRECOGNIZED=$(grep -vE "$IGNORE_PATTERN" /tmp/changed.txt | grep -vE "$FE_PATTERN|$BE_PATTERN" || true)
            if [ -n "$UNRECOGNIZED" ]; then
              echo "WARNING: unrecognized files changed — rebuilding both as safety fallback:"
              echo "$UNRECOGNIZED"
              FRONTEND_DETECTED=true
              BACKEND_DETECTED=true
            fi
          fi

          echo "frontend=$FRONTEND_DETECTED" >> $GITHUB_OUTPUT
          echo "backend=$BACKEND_DETECTED" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          FRONTEND: ${{ steps.diff.outputs.frontend }}
          BACKEND: ${{ steps.diff.outputs.backend }}
          MIGRATION: ${{ steps.diff.outputs.migration_file }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: FRONTEND,BACKEND,MIGRATION
          command_timeout: 60m
          script: |
            set -e
            cd /opt/apfa-prod

            echo "========== Deploy detection =========="
            echo "FRONTEND=$FRONTEND  BACKEND=$BACKEND  MIGRATION=$MIGRATION"

            # Log pre-deploy state for rollback and audit trail
            echo "Pre-deploy SHA: $(git rev-parse HEAD)"

            # Warn if the working directory is dirty (someone SSH'd and
            # edited files directly — this should be break-glass only)
            if [ -n "$(git status --porcelain)" ]; then
              echo "WARNING: Droplet working directory was dirty before deploy — resetting."
              echo "--- git status ---"
              git status --short
              echo "--- git diff (tracked changes being discarded) ---"
              git diff --stat
              git diff | head -200 || true
            fi

            # Force-sync to origin/main. The droplet is a deploy target,
            # not a workspace — its tree must always mirror main exactly.
            git fetch origin main
            echo "Target SHA: $(git rev-parse origin/main)"
            git reset --hard origin/main
            git clean -fdx -e '.env' -e '.env.production' -e 'node_modules' -e 'credentials'

            if [ "$FRONTEND" = "true" ]; then
              echo "Rebuilding frontend..."
              npm ci
              npm run build
              cp -r dist/* /var/www/apfa/
              chown -R www-data:www-data /var/www/apfa/
              systemctl reload nginx
            fi

            if [ "$BACKEND" = "true" ]; then
              echo "Rebuilding backend containers..."
              docker compose up -d --build apfa celery-worker celery-beat
            fi

            if [ -n "$MIGRATION" ]; then
              echo "MIGRATION_NEEDED: $MIGRATION"
            fi

      # APFA-013.5: Health check runs FROM the droplet (via SSH) because
      # DNS for apfa.secureai.dev is not configured yet and no SSL cert exists.
      # Checks localhost:8000/health which hits the uvicorn FastAPI endpoint
      # directly, proving the container is alive and responding.
      # TODO: Replace with https://apfa.secureai.dev/health after DNS + SSL (APFA-014)
      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "Waiting 30s for container startup..."
            sleep 30
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8000/health 2>/dev/null; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10 failed — retrying in 30s..."
              sleep 30
            done
            echo "Health check failed after 5 minutes"
            echo "========== Container status =========="
            docker compose -f /opt/apfa-prod/docker-compose.yml ps
            echo "========== APFA container logs (last 100 lines) =========="
            docker compose -f /opt/apfa-prod/docker-compose.yml logs --tail=100 apfa
            echo "========== Redis/Postgres status =========="
            docker compose -f /opt/apfa-prod/docker-compose.yml ps redis postgres
            exit 1

      - name: Notify Telegram — success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRONTEND: ${{ steps.diff.outputs.frontend }}
          BACKEND: ${{ steps.diff.outputs.backend }}
          MIGRATION: ${{ steps.diff.outputs.migration_file }}
        run: |
          REBUILT=""
          [ "$FRONTEND" = "true" ] && REBUILT="${REBUILT}frontend "
          [ "$BACKEND" = "true" ] && REBUILT="${REBUILT}backend "
          [ -z "$REBUILT" ] && REBUILT="none "
          if [ -n "$MIGRATION" ]; then
            MSG="💰 APFA-Prod deploy complete — rebuilt: ${REBUILT}— health check passed. *Migration needed:* $MIGRATION"
          else
            MSG="💰 APFA-Prod deploy complete — rebuilt: ${REBUILT}— health check passed."
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"${MSG}\", \"parse_mode\": \"Markdown\"}" || true

      - name: Notify Telegram — failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"APFA-Prod Auto-deploy FAILED - check GitHub Actions logs.\"}" || true
