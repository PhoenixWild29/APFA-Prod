name: Backend CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'requirements.txt'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  import-smoke:
    name: Import Smoke Test (app/main.py)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system deps for wheels
        run: sudo apt-get update -qq && sudo apt-get install -qq -y --no-install-recommends libmagic1 libpq-dev build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # BLOCKING: All import-time bugs are resolved (bugs #1-18) and the
      # container has successfully booted in production. Any future import
      # regression will fail CI and block the PR.
      - name: Verify every top-level import in app/main.py resolves
        run: python scripts/check_imports.py

  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests
        run: pytest tests/ -v --cov=app --cov-report=term
        env:
          REDIS_URL: redis://localhost:6379
          TESTING: true
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          API_KEY: test_key
        continue-on-error: true

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install black flake8 bandit

      - name: Run Black (code formatting)
        run: black --check app/ tests/
        continue-on-error: true

      - name: Run Flake8 (style guide)
        run: flake8 app/ tests/ --max-line-length 120 --extend-ignore E501,W503
        continue-on-error: true

      - name: Run Bandit (security scanning)
        run: bandit -r app/ --severity-level high
        continue-on-error: true
