name: Monitoring & Observability

on:
  push:
    branches: [main]
    paths:
      - 'monitoring/**'
      - '.github/workflows/ci-monitoring.yml'
  pull_request:
    branches: [main]
    paths:
      - 'monitoring/**'

jobs:
  validate-prometheus:
    name: Validate Prometheus Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Prometheus config
        run: |
          if [ -f monitoring/prometheus.yml ]; then
            docker run --rm --entrypoint /bin/promtool -v $(pwd)/monitoring:/config prom/prometheus:latest \
              check config /config/prometheus.yml
          else
            echo "No Prometheus config found — skipping"
          fi
        continue-on-error: true

      - name: Validate alert rules
        run: |
          if [ -f monitoring/alerts.yml ]; then
            docker run --rm --entrypoint /bin/promtool -v $(pwd)/monitoring:/config prom/prometheus:latest \
              check rules /config/alerts.yml
          else
            echo "No alert rules found — skipping"
          fi
        continue-on-error: true

  validate-grafana:
    name: Validate Grafana Dashboards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate dashboard JSON
        run: |
          found=0
          for dashboard in monitoring/grafana-dashboards/*.json; do
            if [ -f "$dashboard" ]; then
              echo "Validating $dashboard"
              jq empty "$dashboard" || exit 1
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No Grafana dashboards found — skipping"
          else
            echo "All Grafana dashboards are valid JSON"
          fi
