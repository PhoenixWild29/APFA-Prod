version: 2
updates:
  # Dependabot auto-detects requirements.in + pip-compile lockfile.
  # Its pip-compile support is best-effort — `make lock-upgrade` is the
  # trusted path for full dependency upgrades. Dependabot PRs that touch
  # requirements.txt are validated by the lockfile-check CI job.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # langchain + langgraph must be upgraded together (coordinated stack)
      # Wildcard covers all siblings: langchain-core, langchain-huggingface, langchain-openai, etc.
      - dependency-name: "langchain*"
      # langgraph ecosystem: langgraph, langgraph-prebuilt, langgraph-checkpoint, langgraph-sdk
      - dependency-name: "langgraph*"
      # OpenTelemetry packages are pinned together
      - dependency-name: "opentelemetry-*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # ESLint 9+ requires flat config migration — separate task, not a bump
      - dependency-name: "eslint"
        versions: [">=9.0.0"]
      # eslint-plugin-react-refresh 0.5+ requires eslint 9+ peer — blocked until eslint migration
      - dependency-name: "eslint-plugin-react-refresh"
        versions: [">=0.5.0"]
      # Vite 8 is unvalidated major build tool upgrade — defer to dedicated session
      - dependency-name: "vite"
        versions: [">=8.0.0"]
      # Jest 30 requires test config migration — dedicated session
      - dependency-name: "jest"
        versions: [">=30.0.0"]
      # tailwind-merge 3.x changes merge strategy — needs visual verification, not automated bump
      - dependency-name: "tailwind-merge"
        versions: [">=3.0.0"]
